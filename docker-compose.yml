name: gridlens-local

x-api-environment: &api-environment
  APP_ENV: ${APP_ENV:-local}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  API_HOST: ${API_HOST:-0.0.0.0}
  API_PORT: 8000
  DATABASE_URL: ${DATABASE_URL:-postgresql://gridlens_app:gridlens_app_local@postgres:5432/gridlens_dev}
  AWS_PROFILE: ${AWS_PROFILE:-gridlens-dev}
  AWS_REGION: ${AWS_REGION:-ap-southeast-1}
  AWS_SDK_LOAD_CONFIG: "1"
  HOME: /home/app
  AUTH_MODE: ${AUTH_MODE:-cognito}
  GRIDLENS_RUNTIME_MODE: ${GRIDLENS_RUNTIME_MODE:-local}
  COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:-gridlens-dev-user-pool}
  COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:-gridlens-dev-client}
  COGNITO_ISSUER: ${COGNITO_ISSUER:-https://cognito-idp.ap-southeast-1.amazonaws.com/gridlens-dev-user-pool}
  COGNITO_JWKS_URL: ${COGNITO_JWKS_URL:-https://cognito-idp.ap-southeast-1.amazonaws.com/gridlens-dev-user-pool/.well-known/jwks.json}
  S3_BUCKET_NAME: ${S3_BUCKET_NAME:-gridlens-dev-artifacts}
  SQS_QUEUE_URL: ${SQS_QUEUE_URL:-https://sqs.ap-southeast-1.amazonaws.com/000000000000/gridlens-dev-jobs}
  BEDROCK_TEXT_MODEL_ID: ${BEDROCK_TEXT_MODEL_ID:-anthropic.claude-3-haiku-20240307-v1:0}
  BEDROCK_EMBEDDING_MODEL_ID: ${BEDROCK_EMBEDDING_MODEL_ID:-amazon.titan-embed-text-v2:0}
  OBSERVABILITY_MODE: ${OBSERVABILITY_MODE:-local}
  LOG_EXPORTER: ${LOG_EXPORTER:-loki}
  METRICS_EXPORTER: ${METRICS_EXPORTER:-prometheus}
  TRACES_EXPORTER: ${TRACES_EXPORTER:-tempo}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
  OBSERVABILITY_SMOKE_ROUTES_ENABLED: ${OBSERVABILITY_SMOKE_ROUTES_ENABLED:-true}
  UVICORN_ACCESS_LOG_ENABLED: ${UVICORN_ACCESS_LOG_ENABLED:-false}

x-worker-environment: &worker-environment
  APP_ENV: ${APP_ENV:-local}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  WORKER_HEARTBEAT_SECONDS: ${WORKER_HEARTBEAT_SECONDS:-30}
  DATABASE_URL: ${DATABASE_URL:-postgresql://gridlens_app:gridlens_app_local@postgres:5432/gridlens_dev}
  AWS_PROFILE: ${AWS_PROFILE:-gridlens-dev}
  AWS_REGION: ${AWS_REGION:-ap-southeast-1}
  AWS_SDK_LOAD_CONFIG: "1"
  HOME: /home/app
  SQS_QUEUE_URL: ${SQS_QUEUE_URL:-https://sqs.ap-southeast-1.amazonaws.com/000000000000/gridlens-dev-jobs}
  BEDROCK_TEXT_MODEL_ID: ${BEDROCK_TEXT_MODEL_ID:-anthropic.claude-3-haiku-20240307-v1:0}
  BEDROCK_EMBEDDING_MODEL_ID: ${BEDROCK_EMBEDDING_MODEL_ID:-amazon.titan-embed-text-v2:0}
  OBSERVABILITY_MODE: ${OBSERVABILITY_MODE:-local}
  LOG_EXPORTER: ${LOG_EXPORTER:-loki}
  METRICS_EXPORTER: ${METRICS_EXPORTER:-prometheus}
  TRACES_EXPORTER: ${TRACES_EXPORTER:-tempo}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
  OBSERVABILITY_SMOKE_ROUTES_ENABLED: ${OBSERVABILITY_SMOKE_ROUTES_ENABLED:-true}
  UVICORN_ACCESS_LOG_ENABLED: ${UVICORN_ACCESS_LOG_ENABLED:-false}

x-api-healthcheck: &api-healthcheck
  test:
    - CMD
    - python
    - -c
    - "import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8000/health'))['status'] == 'ok'"
  interval: 10s
  timeout: 5s
  retries: 12

x-worker-healthcheck: &worker-healthcheck
  test:
    - CMD
    - python
    - -c
    - "print('ok')"
  interval: 30s
  timeout: 5s
  retries: 3

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gridlens_dev}
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-gridlens}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-gridlens_local}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/local/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - gridlens-local

  db-migrate:
    build:
      context: .
      dockerfile: infra/db/Dockerfile
    environment:
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:-postgresql://gridlens_migrator:gridlens_migrator_local@postgres:5432/gridlens_dev}
      DATABASE_URL: ${SEED_DATABASE_URL:-postgresql://gridlens_app:gridlens_app_local@postgres:5432/gridlens_dev}
      SEED_JORDAN_COGNITO_SUB: ${SEED_JORDAN_COGNITO_SUB:-dev-jordan-lee}
      SEED_PRIYA_COGNITO_SUB: ${SEED_PRIYA_COGNITO_SUB:-dev-priya-raman}
      SEED_MARCUS_COGNITO_SUB: ${SEED_MARCUS_COGNITO_SUB:-dev-marcus-brooks}
      SEED_KYLE_COGNITO_SUB: ${SEED_KYLE_COGNITO_SUB:-dev-kyle}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gridlens-local

  identity-tenant-service:
    build:
      context: .
      dockerfile: services/identity-tenant-service/Dockerfile
      target: runtime
    environment: *api-environment
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *api-healthcheck
    networks:
      - gridlens-local

  data-operations-service:
    build:
      context: .
      dockerfile: services/data-operations-service/Dockerfile
      target: runtime
    environment: *api-environment
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *api-healthcheck
    networks:
      - gridlens-local

  assistant-service:
    build:
      context: .
      dockerfile: services/assistant-service/Dockerfile
      target: runtime
    environment: *api-environment
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *api-healthcheck
    networks:
      - gridlens-local

  program-evaluation-service:
    build:
      context: .
      dockerfile: services/program-evaluation-service/Dockerfile
      target: runtime
    environment: *api-environment
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *api-healthcheck
    networks:
      - gridlens-local

  insights-reporting-service:
    build:
      context: .
      dockerfile: services/insights-reporting-service/Dockerfile
      target: runtime
    environment: *api-environment
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *api-healthcheck
    networks:
      - gridlens-local

  governance-service:
    build:
      context: .
      dockerfile: services/governance-service/Dockerfile
      target: runtime
    environment: *api-environment
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *api-healthcheck
    networks:
      - gridlens-local

  alerts-anomalies-service:
    build:
      context: .
      dockerfile: services/alerts-anomalies-service/Dockerfile
      target: runtime
    environment: *api-environment
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *api-healthcheck
    networks:
      - gridlens-local

  kong:
    image: kong:3.9
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 127.0.0.1:8001
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8000}:8000"
    volumes:
      - ./infra/local/kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      identity-tenant-service:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - kong
        - health
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - gridlens-local

  data-operations-worker:
    build:
      context: .
      dockerfile: services/data-operations-service/Dockerfile
      target: runtime
    environment: *worker-environment
    command: ["python", "-m", "gridlens_data_operations_service.workers.main"]
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *worker-healthcheck
    networks:
      - gridlens-local

  assistant-worker:
    build:
      context: .
      dockerfile: services/assistant-service/Dockerfile
      target: runtime
    environment: *worker-environment
    command: ["python", "-m", "gridlens_assistant_service.workers.main"]
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *worker-healthcheck
    networks:
      - gridlens-local

  program-evaluation-worker:
    build:
      context: .
      dockerfile: services/program-evaluation-service/Dockerfile
      target: runtime
    environment: *worker-environment
    command: ["python", "-m", "gridlens_program_evaluation_service.workers.main"]
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *worker-healthcheck
    networks:
      - gridlens-local

  insights-reporting-worker:
    build:
      context: .
      dockerfile: services/insights-reporting-service/Dockerfile
      target: runtime
    environment: *worker-environment
    command: ["python", "-m", "gridlens_insights_reporting_service.workers.main"]
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *worker-healthcheck
    networks:
      - gridlens-local

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/local/observability/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    ports:
      - "127.0.0.1:${OTEL_HTTP_PORT:-4318}:4318"
    networks:
      - gridlens-local

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./infra/local/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - gridlens-local

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./infra/local/observability/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    networks:
      - gridlens-local

  tempo:
    image: grafana/tempo:2.6.1
    user: "0:0"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./infra/local/observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "127.0.0.1:${TEMPO_PORT:-3200}:3200"
    networks:
      - gridlens-local

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-gridlens}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-gridlens_local}
    volumes:
      - ./infra/local/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/local/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - gridlens-local

volumes:
  postgres-data:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:

networks:
  gridlens-local:
    driver: bridge
