_format_version: "3.0"
_transform: true

services:
  - name: gridlens-health-upstream
    url: http://identity-tenant-service:8000/health
    routes:
      - name: gridlens-api-v1-health
        paths:
          - /api/v1/health
        methods:
          - GET
        strip_path: true

  - name: gridlens-observability-upstream
    url: http://identity-tenant-service:8000
    routes:
      - name: gridlens-observability-smoke
        paths:
          - /__observability
        methods:
          - GET
        strip_path: false
      - name: gridlens-observability-metrics
        paths:
          - /metrics
        methods:
          - GET
        strip_path: false
