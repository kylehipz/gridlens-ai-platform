name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest
    env:
      SYSTEM_PYTHON: python
      PYTHON: .venv/bin/python
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      POSTGRES_DB: gridlens_dev
      POSTGRES_SUPERUSER: gridlens
      POSTGRES_SUPERUSER_PASSWORD: gridlens_local
      POSTGRES_MIGRATOR_USER: gridlens_migrator
      POSTGRES_MIGRATOR_PASSWORD: gridlens_migrator_local
      POSTGRES_APP_USER: gridlens_app
      POSTGRES_APP_PASSWORD: gridlens_app_local
      MIGRATION_DATABASE_URL: postgresql://gridlens_migrator:gridlens_migrator_local@postgres:5432/gridlens_dev
      DATABASE_URL: postgresql://gridlens_app:gridlens_app_local@127.0.0.1:5432/gridlens_dev
      AWS_EC2_METADATA_DISABLED: "true"
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: mock
      AWS_SECRET_ACCESS_KEY: mock
      AWS_SESSION_TOKEN: mock
      AWS_SDK_LOAD_CONFIG: "0"
      COGNITO_USER_POOL_ID: mock-user-pool
      COGNITO_CLIENT_ID: mock-client
      S3_BUCKET_NAME: mock-gridlens-artifacts
      SQS_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/000000000000/mock-gridlens-jobs
      BEDROCK_TEXT_MODEL_ID: mock-text-model
      BEDROCK_EMBEDDING_MODEL_ID: mock-embedding-model
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start PostgreSQL
        run: |
          docker compose -f docker-compose.yml up -d postgres
          for attempt in $(seq 1 30); do
            if docker compose -f docker-compose.yml exec -T postgres pg_isready -U gridlens -d gridlens_dev; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.yml logs postgres
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup
        run: make setup

      - name: Typecheck
        run: make typecheck

      - name: Lint
        run: make lint

      - name: Backend offline tests
        run: make test-backend

      - name: Frontend offline tests
        run: make test-frontend

      - name: Migrate database
        run: make migrate

      - name: Seed database
        run: make seed

      - name: Local database checks
        run: make test-local-db
