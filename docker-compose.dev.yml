services:
  identity-tenant-service:
    build:
      target: dev
    environment:
      APP_ENV: development
      WORKER_HEARTBEAT_SECONDS: ${WORKER_HEARTBEAT_SECONDS:-10}
      DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-true}
    command:
      - uvicorn
      - gridlens_identity_tenant_service.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
    volumes:
      - ./services/identity-tenant-service/src:/app/src:ro
      - ${HOME}/.aws:/home/app/.aws:ro
    restart: unless-stopped

  data-operations-service:
    build:
      target: dev
    environment:
