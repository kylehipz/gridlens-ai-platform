services:
  api:
    build:
      target: dev
    environment:
      APP_ENV: development
      DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-true}
      API_DEBUG_PORT: ${API_DEBUG_PORT:-5678}
    command: ["python", "-m", "gridlens_api_gateway.main"]
    ports:
      - "${API_DEBUG_PORT:-5678}:5678"
    volumes:
      - ./services/api-gateway/src:/app/src:ro
      - ${HOME}/.aws:/home/app/.aws:ro
    restart: unless-stopped

  worker:
    build:
      target: dev
    environment:
      APP_ENV: development
      WORKER_DEBUG_PORT: ${WORKER_DEBUG_PORT:-5679}
      WORKER_HEARTBEAT_SECONDS: ${WORKER_HEARTBEAT_SECONDS:-10}
    command: ["python", "-m", "gridlens_local_runtime_worker.main"]
    ports:
      - "${WORKER_DEBUG_PORT:-5679}:5679"
    volumes:
      - ./workers/local-runtime-worker/src:/app/src:ro
      - ${HOME}/.aws:/home/app/.aws:ro
    restart: unless-stopped
