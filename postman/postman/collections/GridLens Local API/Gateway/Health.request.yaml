$kind: http-request
description: "Validates the browser-facing local gateway path: Kong routes /api/v1/health to the identity tenant service."
url: "{{base_url}}/api/v1/health"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('returns 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('returns JSON', function () {
        pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });

      const json = pm.response.json();
      pm.test('reports healthy gateway upstream', function () {
        pm.expect(json.status).to.eql('ok');
        pm.expect(json.service).to.eql('identity-tenant-service');
      });
    language: text/javascript
examples: ./.resources/Health.resources/examples
order: 1000
