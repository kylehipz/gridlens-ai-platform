$kind: http-request
url: "{{data_operations_service_url}}/health"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('returns 200', function () {
        pm.response.to.have.status(200);
      });
      pm.test('returns JSON', function () {
        pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });
      const json = pm.response.json();
      pm.test('reports data-operations-service', function () {
        pm.expect(json.status).to.eql('ok');
        pm.expect(json.service).to.eql('data-operations-service');
      });
    language: text/javascript
order: 2000
